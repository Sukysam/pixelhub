name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend tests
        run: |
          python -m coverage run --source=core manage.py test -v 2
          python -m coverage report --include='core/import_export.py' --fail-under=80
          python -m coverage report

      - name: Django deploy check
        run: |
          DJANGO_DEBUG=0 \
          DJANGO_SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(64))')" \
          DJANGO_ALLOWED_HOSTS="example.com" \
          DJANGO_CORS_ALLOWED_ORIGINS="https://example.com" \
          DJANGO_EMAIL_HOST="localhost" \
          python manage.py check --deploy

      - name: Dependency vulnerability audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

          - name: Check backend logs
          if: always()
          run: |
            echo "=== Django Server Logs ==="
            tail -n 100 /tmp/django.log || echo "No logs found"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Dependency vulnerability audit
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set e2e credentials
        run: |
          echo "E2E_USERNAME=admin" >> "$GITHUB_ENV"
          echo "E2E_PASSWORD=$(python -c 'import secrets; print(secrets.token_urlsafe(24))')" >> "$GITHUB_ENV"

      - name: Prepare backend (migrate + seed user)
        run: |
          python manage.py migrate
          python manage.py shell -c "import os; from django.contrib.auth.models import User; u, _ = User.objects.get_or_create(username=os.environ.get('E2E_USERNAME','admin')); u.is_staff=True; u.is_superuser=True; u.set_password(os.environ['E2E_PASSWORD']); u.save()"

      - name: Start backend
        run: |
          nohup python manage.py runserver 127.0.0.1:8000 > /tmp/django.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/api/auth/captcha/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready"
          tail -n 200 /tmp/django.log || true
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --verbose

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://127.0.0.1:8000/api"
        run: |
          nohup npm run dev -- -p 3003 -H 127.0.0.1 > /tmp/next.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3003 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become ready"
          tail -n 200 /tmp/next.log || true
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        env:
          E2E_BASE_URL: "http://127.0.0.1:3003"
        run: npm run test:e2e

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          args: --redact

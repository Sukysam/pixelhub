# nixpacks.toml for PIXELHUB monorepo deployments on platforms that build from
# the repository root. Set APP_RUNTIME=frontend for the Next.js app; backend is
# the default.

[variables]
APP_RUNTIME = "backend"

[phases.setup]
nixPkgs = ["python311", "nodejs_20", "cairo", "pango", "gdk-pixbuf", "shared-mime-info"]

[phases.install]
cmds = [
  "if [ \"$APP_RUNTIME\" = \"frontend\" ]; then cd frontend && npm ci; else python -m venv venv && ./venv/bin/pip install --upgrade pip setuptools wheel && ./venv/bin/pip install -r requirements.txt; fi",
]

[phases.build]
cmds = [
  "if [ \"$APP_RUNTIME\" = \"frontend\" ]; then cd frontend && npm run build; else ./venv/bin/python manage.py collectstatic --noinput; fi",
]

[start]
cmd = "if [ \"$APP_RUNTIME\" = \"frontend\" ]; then cd frontend && node .next/standalone/server.js; else ./venv/bin/python manage.py migrate && ./venv/bin/gunicorn pixelhub.wsgi:application -b 0.0.0.0:${PORT:-8080}; fi"

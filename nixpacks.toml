# nixpacks.toml for PIXELHUB Backend on Sevalla

[phases.setup]
nixPkgs = ["python311", "cairo", "pango", "gdk-pixbuf", "shared-mime-info"]

[phases.install]
cmds = ["python -m venv venv", "./venv/bin/pip install --upgrade pip setuptools wheel", "./venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["./venv/bin/python manage.py collectstatic --noinput"]

[start]
cmd = "./venv/bin/python manage.py migrate && ./venv/bin/gunicorn pixelhub.wsgi:application -b 0.0.0.0:$PORT"
